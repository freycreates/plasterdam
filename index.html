<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f3b35" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Plasterdam" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Plasterdam</title>
    <link rel="apple-touch-icon" href="./assets/logo.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="./assets/logo.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./styles.css?v=5" />
  </head>
  <body>
    <main class="app-shell">
      <section class="map-wrap" aria-label="Map of public toilets in Amsterdam">
        <div id="map"></div>
        <div class="topbar">
          <div class="brand-lockup">
            <img class="app-logo" src="./assets/logo.png" alt="" onerror="this.hidden = true" />
            <div>
              <h1>Plasterdam</h1>
            </div>
          </div>
          <button class="icon-button" id="locateButton" type="button" aria-label="Show my location" title="Show my location">
            <span aria-hidden="true">◎</span>
          </button>
        </div>
        <div class="status-card" id="statusCard">
          <span id="resultCount">0</span>
          <span id="resultLabel">locations</span>
        </div>
      </section>

      <section class="sheet" aria-label="Toilet filters and results">
        <div class="sheet-header">
          <div>
            <h2>Filters</h2>
            <p id="dataStatus">Loading official Amsterdam data.</p>
          </div>
        </div>

        <label class="search-field">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="Street, name, category" autocomplete="off" />
        </label>

        <div class="filter-actions">
          <button id="selectAllButton" type="button">All</button>
          <button id="clearButton" type="button">None</button>
        </div>

        <div class="filters" id="filters"></div>

        <div class="results" id="results" aria-live="polite"></div>
      </section>
    </main>

    <template id="resultTemplate">
      <article class="result-card">
        <button class="result-main" type="button">
          <span class="result-type"></span>
          <strong class="result-name"></strong>
          <span class="result-address"></span>
        </button>
        <a class="route-link" target="_blank" rel="noreferrer">Route</a>
      </article>
    </template>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./app.js?v=4"></script>
  </body>
</html>
